<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chip SMP</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif; 
  background:#0f1218;
  color:white;
}

header{
  text-align:center;
  padding:20px;
  font-size:28px;
  font-weight:bold;
}

.navbar{
  background:#0b0f17;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
}

.nav-title{
  font-size:22px;
  font-weight:bold;
}

.nav-links a{
  color:white;
  text-decoration:none;
  margin-left:15px;
  font-weight:bold;
}

.nav-links a:hover{
  color:#00c8ff;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  padding:30px;
  max-width:1200px;
  margin:auto;
}

.card{
  position:relative;
  background:#1a1f2a;
  border-radius:14px;
  overflow:hidden;
  height:180px;
  transition:.2s ease;
}

.card:hover{
  box-shadow:0 0 20px rgba(0,200,255,0.7);
  transform:scale(1.02);
}

.img-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.text-box{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:linear-gradient(transparent,rgba(0,0,0,0.9));
  padding:15px;
}

.copy-card{
  background:url("images/join.png") center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
}

.overlay{
  background:rgba(0,0,0,0.65);
  padding:20px 30px;
  border-radius:12px;
  text-align:center;
}

.copy-card button{
  background:#5865F2;
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.copy-card button:hover{
  box-shadow:0 0 15px rgba(88,101,242,0.9);
}

.status-card{
  background:#111;
  border-radius:14px;
  padding:18px;
  text-align:center;
}

.player-list{
  margin-top:10px;
  font-size:14px;
}

@media(max-width:800px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>

</head>

<body>

<nav class="navbar">
  <div class="nav-title">ChipSMP</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="store.html">Store</a>
    <a href="https://discord.gg/UfRKvtFBC2" target="_blank">Discord</a>
    <a href="partners.html">Partners</a>
    <a href="Bedrock.html">Bedrock</a>
    <a href="tos.html">Terms Of Service</a>
  </div>
</nav>

<header>Welcome to Chip SMP</header>

<div class="grid">

<div class="card copy-card">
<div class="overlay">
<div style="font-size:20px;font-weight:bold;">Join Our Discord</div>
<button onclick="copyDiscord()">Copy Discord Invite</button>
</div>
</div>

<div class="status-card">
<span id="status-dot">🔴</span>
<span id="status-text">Offline</span> —
<span id="player-count">0</span> players

<div class="player-list" id="player-list">
Checking...
</div>
</div>

</div>

<script>

// COPY DISCORD
function copyDiscord(){
navigator.clipboard.writeText("https://discord.gg/UfRKvtFBC2");
alert("Discord invite copied!");
}

// SERVER STATUS
const SERVER_IP = "play.chipsmp.net";

async function updateServerStatus(){
try{
const res = await fetch(`https://api.mcsrvstat.us/2/${SERVER_IP}`);
const data = await res.json();

if(data.online){
document.getElementById("status-dot").textContent="🟢";
document.getElementById("status-text").textContent="Online";
document.getElementById("player-count").textContent =
data.players.online + "/" + data.players.max;

if(data.players.list){
document.getElementById("player-list").innerHTML =
data.players.list.join("<br>");
}else{
document.getElementById("player-list").textContent="No players online";
}

}else{
document.getElementById("status-dot").textContent="🔴";
document.getElementById("status-text").textContent="Offline";
document.getElementById("player-count").textContent="0";
document.getElementById("player-list").textContent="Server offline";
}

}catch{
document.getElementById("status-text").textContent="Error";
}
}

updateServerStatus();
setInterval(updateServerStatus, 15000);

</script>

</body>
</html>
