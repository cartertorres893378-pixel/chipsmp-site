<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ChipSMP Secret Panel</title>

<style>

body{
margin:0;
background:#0f1218;
color:white;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.panel{
background:#1a1f2a;
padding:70px;
border-radius:14px;
box-shadow:0 0 25px rgba(0,200,255,0.5);
max-width:700px;
}

.title{
font-size:32px;
margin-bottom:30px;
}

.text{
font-size:22px;
line-height:1.6;
}

.count{
font-size:28px;
color:#00c8ff;
margin-top:10px;
}

</style>
</head>

<body>

<div class="panel">

<div class="title">
ChipSMP Secret Panel
</div>

<div class="text">
This website has been opened
</div>

<div class="count" id="visitNumber">
loading...
</div>

<div class="text">
times
</div>

</div>

<script>

let visits = localStorage.getItem("chipsmpVisits");

if(!visits){
visits = 0;
}

document.getElementById("visitNumber").textContent = visits;

</script>

</body>
</html>
