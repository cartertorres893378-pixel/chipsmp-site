<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ChipSMP Secret Panel</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f1218;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.panel{
background:#1a1f2a;
padding:60px;
border-radius:14px;
text-align:center;
box-shadow:0 0 30px rgba(0,200,255,0.5);
}

</style>

</head>

<body>

<div class="panel">

<h1>ChipSMP Secret Panel</h1>

<p id="visits"></p>

</div>

<script>

let visits = localStorage.getItem("chipsmpVisits");

if(!visits){
visits = 1;
}else{
visits = Number(visits) + 1;
}

localStorage.setItem("chipsmpVisits", visits);

document.getElementById("visits").textContent =
"You opened the secret page " + visits + " times.";

</script>

</body>
</html>
