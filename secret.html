<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ChipSMP Secret Panel</title>

<style>

body{
margin:0;
background:#0f1218;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.panel{
background:#1a1f2a;
padding:70px;
border-radius:14px;
box-shadow:0 0 25px rgba(0,200,255,0.5);
max-width:700px;
}

.title{
font-size:32px;
margin-bottom:30px;
}

.text{
font-size:22px;
line-height:1.6;
}

.count{
font-size:36px;
color:#00c8ff;
margin:15px 0;
}

</style>
</head>

<body>

<div class="panel">

<div class="title">
ChipSMP Secret Panel
</div>

<div class="text">
This website has been opened
</div>

<div class="count" id="visits">
loading...
</div>

<div class="text">
times
</div>

</div>

<script>

async function updateVisits(){

const res = await fetch("https://api.countapi.xyz/hit/chipsmp.net/visits");
const data = await res.json();

document.getElementById("visits").textContent = data.value;

}

updateVisits();

</script>

</body>
</html>
